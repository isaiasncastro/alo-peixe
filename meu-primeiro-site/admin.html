<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Alô Peixe</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <a class="brand" href="/">
      <img src="assets/alo-peixe-logo.jpeg" alt="Logo Alô Peixe" />
      <span>
        <strong>Painel Alô Peixe</strong>
        <small>Controle editorial completo</small>
      </span>
    </a>
    <a class="admin-public-link" href="/">Ver site público</a>
  </header>

  <main class="admin-shell">
    <section class="admin-card login-card" id="loginCard">
      <h1>Entrar no painel</h1>
      <p>Digite a senha configurada no Render em <strong>ADMIN_PASSWORD</strong>.</p>
      <form id="loginForm">
        <label>
          Senha do painel
          <input id="passwordInput" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Entrar</button>
      </form>
      <p class="message" id="loginMessage" role="status"></p>
    </section>

    <section class="admin-workspace" id="adminWorkspace" hidden>
      <nav class="admin-tabs" aria-label="Áreas do painel">
        <button class="tab-button is-active" type="button" data-tab="settingsPanel">Editar site</button>
        <button class="tab-button" type="button" data-tab="storyPanel">Matérias</button>
      </nav>

      <section class="admin-panel is-active" id="settingsPanel">
        <form class="admin-card editor-card" id="settingsForm">
          <div class="form-heading">
            <div>
              <p class="eyebrow">Configurações do portal</p>
              <h1>Editar textos e funcionamento</h1>
            </div>
          </div>

          <div class="form-grid">
            <label>
              Nome do site
              <input id="siteNameInput" type="text" required />
            </label>
            <label>
              Subtítulo da marca
              <input id="taglineInput" type="text" required />
            </label>
          </div>

          <label>
            Texto pequeno do topo
            <input id="heroEyebrowInput" type="text" required />
          </label>

          <label>
            Título principal
            <textarea id="heroTitleInput" rows="2" required></textarea>
          </label>

          <label>
            Descrição principal
            <textarea id="heroDescriptionInput" rows="3" required></textarea>
          </label>

          <div class="form-grid">
            <label>
              Texto do selo ao vivo
              <input id="tickerLabelInput" type="text" required />
            </label>
            <label>
              Link da fonte original
              <input id="publicSourceUrlInput" type="url" required />
            </label>
          </div>

          <label>
            Logo ou imagem principal
            <input id="logoInput" type="text" required />
          </label>

          <label>
            Texto do rodapé
            <input id="footerTextInput" type="text" required />
          </label>

          <label class="checkbox-label">
            <input id="automaticFeedInput" type="checkbox" />
            Usar notícias automáticas do G1 Tocantins
          </label>

          <div class="form-actions">
            <button type="submit">Salvar alterações do site</button>
            <p class="message" id="settingsMessage" role="status"></p>
          </div>
        </form>
      </section>

      <section class="admin-panel" id="storyPanel">
        <div class="admin-grid">
          <form class="admin-card editor-card" id="storyForm">
            <div class="form-heading">
              <div>
                <p class="eyebrow">Publicação local</p>
                <h1 id="formTitle">Nova matéria</h1>
              </div>
              <button class="secondary-button" id="resetButton" type="button">Limpar</button>
            </div>

            <input id="storyId" type="hidden" />

            <label>
              Título
              <input id="titleInput" type="text" maxlength="140" required />
            </label>

            <label>
              Resumo
              <textarea id="descriptionInput" rows="3" maxlength="280"></textarea>
            </label>

            <label>
              Texto completo ou observações
              <textarea id="contentInput" rows="7"></textarea>
            </label>

            <div class="form-grid">
              <label>
                Imagem
                <input id="imageInput" type="text" placeholder="assets/alo-peixe-logo.jpeg ou https://..." />
              </label>

              <label>
                Link externo
                <input id="linkInput" type="text" placeholder="#" />
              </label>
            </div>

            <div class="form-grid">
              <label>
                Tipo
                <select id="mediaTypeInput">
                  <option value="imagem">Imagem</option>
                  <option value="vídeo">Vídeo</option>
                </select>
              </label>

              <label class="checkbox-label">
                <input id="publishedInput" type="checkbox" checked />
                Publicar no site
              </label>
            </div>

            <div class="form-actions">
              <button type="submit">Salvar matéria</button>
              <p class="message" id="formMessage" role="status"></p>
            </div>
          </form>

          <section class="admin-card list-card">
            <div class="form-heading">
              <div>
                <p class="eyebrow">Arquivo editorial</p>
                <h2>Matérias cadastradas</h2>
              </div>
              <button class="secondary-button" id="reloadButton" type="button">Recarregar</button>
            </div>
            <div class="exclusive-list" id="exclusiveList"></div>
          </section>
        </div>
      </section>
    </section>
  </main>

  <template id="exclusiveTemplate">
    <article class="exclusive-item">
      <img alt="" />
      <div>
        <span></span>
        <h3></h3>
        <p></p>
      </div>
      <div class="item-actions">
        <button class="secondary-button edit-button" type="button">Editar</button>
        <button class="danger-button delete-button" type="button">Excluir</button>
      </div>
    </article>
  </template>

  <script src="admin.js?v=3"></script>
</body>
</html>
